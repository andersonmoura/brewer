<!DOCTYPE html>
<html lang="pt" 
      xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorator="layout/LayoutPadrao">

<head>
	<title>Cadastro de usuário</title>
	<link rel="stylesheet" type="text/css" th:href="@{/stylesheets/vendors/bootstrap-switch.min.css}"/>
</head>

<body>
	<section layout:fragment="conteudo">
		<div class="page-header">
			<div class="container-fluid">
				<h1>
					Cadastro de Usuário
				</h1>
			</div>
		</div>
		
		<div class="container-fluid">
			<form method="POST" th:object="${usuario}" class="form-vertical  js-form-loading">
				<div class="form-group">
					<label for="nome">Nome</label>
					<input id="nome" class="form-control">
				</div>
				
				<div class="row">
					<div class="col-lg-4 col-sm-6 form-group">
						<label for="email">E-mail</label>
						<input id="email" class="form-control">
					</div>
					
					<div class="col-lg-8 col-sm-6 form-group">
						<label for="dn">Data de Nascimento</label>
						<input id="dn" class="form-control">
					</div>
						
				</div>
								
				<div class="row">
					<div class="col-lg-4 col-sm-12 form-group">
						<label for="senha">Senha</label>
						<input id="senha" class="form-control" type="password">
					</div>
					
					<div class="col-lg-4 col-sm-12 form-group">
						<label for="confSenha">Confirmação de senha</label>
						<input id="confSenha" class="form-control" type="password">
					</div>
					
					<div class="col-lg-4 col-sm-12 form-group">
						<label for="status" class="control-label">Status</label>
						<div>
							<input type="checkbox" class="js-status" data-size="small" data-off-color="danger" data-on-text="Ativo" data-off-text="Inativo" />							
						</div>
					</div>					
				</div>
				
				<div class="row">
					<div class="form-group  col-sm-6">
						<label class="control-label">Grupos</label> 
						<div>					
  							<div class="checkbox  checkbox-inline"> 
	    						<input type="checkbox" />
	    						<label>Administrador</label>
    						</div>
    				
    						<div class="checkbox  checkbox-inline"> 
	    						<input type="checkbox" />
	    						<label>Vendedor</label>
    						</div>    														
						</div>
					</div>
				</div>
				
				<div class="form-group">
					<button class="btn  btn-primary" type="submit">Salvar</button>
				</div>	
			</form>
		</div>
		
	</section>
	
	<th:block layout:fragment="javascript-extra">
		<script th:src="@{/javascripts/vendors/bootstrap-switch.min.js}"></script>
		<script>
			$('.js-status').bootstrapSwitch();
		</script>
	</th:block>
</body>
</html>
